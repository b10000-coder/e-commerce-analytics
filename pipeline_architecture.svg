<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Two pipelines: GitHub Actions CI and Airflow production DAG</title>
<desc>Side-by-side diagram showing the GitHub Actions CI pipeline on the left and the Airflow production pipeline on the right, with shared source code at the top</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- SHARED SOURCE -->
<rect x="215" y="20" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="36" text-anchor="middle" dominant-baseline="central">git push</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="54" text-anchor="middle" dominant-baseline="central">source code · generator · dbt models</text>

<!-- split arrows -->
<line x1="280" y1="64" x2="160" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="64" x2="520" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LEFT COLUMN — GitHub Actions CI -->
<rect x="20" y="98" width="290" height="490" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="165" y="93" text-anchor="middle">GitHub Actions · push to dev · ~46s</text>

<rect x="45" y="112" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="165" y="128" text-anchor="middle" dominant-baseline="central">ubuntu-latest runner</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="165" y="146" text-anchor="middle" dominant-baseline="central">fresh environment, every push</text>
<line x1="165" y1="156" x2="165" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="45" y="188" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="165" y="204" text-anchor="middle" dominant-baseline="central">install dependencies</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="165" y="222" text-anchor="middle" dominant-baseline="central">dbt-duckdb · faker · pip cache</text>
<line x1="165" y1="232" x2="165" y2="264" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="45" y="264" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="165" y="280" text-anchor="middle" dominant-baseline="central">generate data</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="165" y="298" text-anchor="middle" dominant-baseline="central">generate.py → 10 CSVs</text>
<line x1="165" y1="308" x2="165" y2="340" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="45" y="340" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="165" y="356" text-anchor="middle" dominant-baseline="central">load raw tables</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="165" y="374" text-anchor="middle" dominant-baseline="central">load_raw.py → DuckDB</text>
<line x1="165" y1="384" x2="165" y2="416" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="45" y="416" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="165" y="432" text-anchor="middle" dominant-baseline="central">dbt build --target dev</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="165" y="450" text-anchor="middle" dominant-baseline="central">19 models · 100 tests · DuckDB</text>
<line x1="165" y1="460" x2="165" y2="492" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="45" y="492" width="240" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="165" y="508" text-anchor="middle" dominant-baseline="central">upload artifact</text>
<text font-family="sans-serif" font-size="12" fill="#3B6D11" x="165" y="526" text-anchor="middle" dominant-baseline="central">ecom.duckdb → Actions storage</text>

<rect x="85" y="556" width="160" height="28" rx="14" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#27500A" x="165" y="570" text-anchor="middle" dominant-baseline="central">pass / fail badge</text>

<!-- RIGHT COLUMN — Airflow -->
<rect x="370" y="98" width="290" height="490" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="515" y="93" text-anchor="middle">Airflow · daily 06:00 UTC · ~3 min</text>

<rect x="395" y="112" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="515" y="128" text-anchor="middle" dominant-baseline="central">start</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="515" y="146" text-anchor="middle" dominant-baseline="central">scheduled trigger · Mac local</text>
<line x1="515" y1="156" x2="515" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="395" y="188" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="515" y="204" text-anchor="middle" dominant-baseline="central">check_source_freshness</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="515" y="222" text-anchor="middle" dominant-baseline="central">orders.csv modified &lt; 24h?</text>

<line x1="455" y1="232" x2="420" y2="264" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="575" y1="232" x2="610" y2="264" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="430" y="258" text-anchor="middle">stale</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="600" y="258" text-anchor="middle">fresh</text>

<rect x="393" y="264" width="90" height="36" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="438" y="278" text-anchor="middle" dominant-baseline="central">skip</text>
<text font-family="sans-serif" font-size="11" fill="#993C1D" x="438" y="294" text-anchor="middle" dominant-baseline="central">notify_stale</text>

<rect x="500" y="264" width="152" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#085041" x="576" y="278" text-anchor="middle" dominant-baseline="central">load_raw_to_bigquery</text>
<text font-family="sans-serif" font-size="11" fill="#0F6E56" x="576" y="298" text-anchor="middle" dominant-baseline="central">10 CSVs → BQ raw</text>
<line x1="576" y1="308" x2="576" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="576" y1="330" x2="515" y2="340" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="395" y="340" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="515" y="356" text-anchor="middle" dominant-baseline="central">dbt_build_bigquery</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="515" y="374" text-anchor="middle" dominant-baseline="central">19 models · 100 tests · BigQuery</text>
<line x1="515" y1="384" x2="515" y2="416" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="395" y="416" width="240" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="515" y="432" text-anchor="middle" dominant-baseline="central">notify_success</text>
<text font-family="sans-serif" font-size="12" fill="#3B6D11" x="515" y="450" text-anchor="middle" dominant-baseline="central">log completion timestamp</text>
<line x1="515" y1="460" x2="515" y2="492" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="395" y="492" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="515" y="508" text-anchor="middle" dominant-baseline="central">Looker Studio</text>
<text font-family="sans-serif" font-size="12" fill="#185FA5" x="515" y="526" text-anchor="middle" dominant-baseline="central">live dashboard · BigQuery marts</text>

<rect x="435" y="556" width="160" height="28" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C" x="515" y="570" text-anchor="middle" dominant-baseline="central">dashboard refreshed</text>

<!-- LEGEND -->
<rect x="20" y="650" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="38" y="661">data movement</text>
<rect x="160" y="650" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="178" y="661">dbt transform + test</text>
<rect x="330" y="650" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="348" y="661">BI / output</text>
<rect x="440" y="650" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="458" y="661">infra / setup</text>
<rect x="545" y="650" width="12" height="12" rx="2" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="563" y="661">stale / skip</text>
</svg>
