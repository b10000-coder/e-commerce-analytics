version: 2

models:
  - name: dim_date
    description: "Generated date dimension. date_key (YYYYMMDD integer) is the FK used in fact_orders."
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null
      - name: date
        data_tests:
          - unique
          - not_null

  - name: dim_seller
    description: "One row per seller with surrogate key."
    columns:
      - name: seller_key
        data_tests:
          - unique
          - not_null
      - name: seller_id
        data_tests:
          - unique
          - not_null

  - name: dim_product
    description: "One row per product with surrogate key and gross margin."
    columns:
      - name: product_key
        data_tests:
          - unique
          - not_null
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_customer
    description: "Type 1 customer dimension (current values only). Type 2 SCD added Day 4."
    columns:
      - name: customer_key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: fact_orders
    description: "Fact table at order line-item grain. Join to dim_* tables via *_key columns."
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: customer_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: product_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: seller_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_seller')
              field: seller_key

  - name: dim_customer_scd2
    description: >
      SCD Type 2 customer dimension. One row per customer per time period.
      Use effective_date/expiry_date to join to fact_orders at the correct point in time.
      is_current = TRUE for the version active today.
    columns:
      - name: customer_scd_key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: effective_date
        data_tests:
          - not_null
      - name: is_current_flag
        data_tests:
          - not_null

  - name: dim_campaign
    description: "Campaign dimension — flash sales, coupons, seasonal, loyalty."
    columns:
      - name: campaign_key
        description: "Surrogate key. -1 used in fact_orders when no campaign applies."
        tests: [not_null, unique]
      - name: campaign_id
        tests: [not_null, unique]
      - name: campaign_type
        description: "Type: flash_sale, coupon, seasonal, loyalty."

  - name: dim_seller_scd2
    description: "Type 2 seller dimension. Tracks tier and rating changes using effective_date/expiry_date/is_current_flag — Trendyol pattern."
    columns:
      - name: seller_scd_key
        description: "Surrogate key — unique per seller version."
        tests: [not_null, unique]
      - name: seller_id
        tests: [not_null]
      - name: is_current_flag
        description: "True for the currently active version."

  - name: fact_seller_daily
    description: "Pre-aggregated daily seller performance — one row per seller per day. Incremental."
    columns:
      - name: seller_key
        tests: [not_null]
      - name: stat_date
        tests: [not_null]
      - name: gmv
        description: "Total line revenue for this seller on this day."
