version: 2

models:
  - name: dim_date
    description: "Generated date dimension. date_key (YYYYMMDD integer) is the FK used in fact_orders."
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null
      - name: date
        data_tests:
          - unique
          - not_null

  - name: dim_seller
    description: "One row per seller with surrogate key."
    columns:
      - name: seller_key
        data_tests:
          - unique
          - not_null
      - name: seller_id
        data_tests:
          - unique
          - not_null

  - name: dim_product
    description: "One row per product with surrogate key and gross margin."
    columns:
      - name: product_key
        data_tests:
          - unique
          - not_null
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_customer
    description: "Type 1 customer dimension (current values only). Type 2 SCD added Day 4."
    columns:
      - name: customer_key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: fact_orders
    description: "Fact table at order line-item grain. Join to dim_* tables via *_key columns."
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: customer_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: product_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: seller_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_seller')
              field: seller_key

  - name: dim_customer_scd2
    description: >
      SCD Type 2 customer dimension. One row per customer per time period.
      Use valid_from/valid_to to join to fact_orders at the correct point in time.
      is_current = TRUE for the version active today.
    columns:
      - name: customer_scd_key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: valid_from
        data_tests:
          - not_null
      - name: version_number
        data_tests:
          - not_null
